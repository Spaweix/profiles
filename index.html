<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Spaweix | Profile</title>
    <link rel="icon" href="https://cdn.prod.website-files.com/6257adef93867e50d84d30e2/636e0a6a49cf127bf92de1e2_icon_clyde_blurple_RGB.png" type="image/png">

    <meta name="theme-color" content="#000000">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://spaweix.github.io/profiles/">
    <meta property="og:title" content="Spaweix | Software Developer & Writer">
    <meta property="og:description" content="Karanlığın içinden gelen kodlar ve hikayeler. Sessizliğin Başlangıcı...">
    <meta property="og:image" content="https://spaweix.github.io/profiles/pfp.jpg"> 

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>
</head>
<body>
    <div class="custom-cursor"></div>

    <div id="splash-screen">
        <span class="splash-text">[ SİSTEME GİRİŞ YAPMAK İÇİN TIKLA ]</span>
    </div>

    <div id="particles-js"></div>

    <canvas id="audio-visualizer"></canvas>

    <div class="audio-player-ui" id="music-btn">
        <i class="fas fa-play" id="music-icon"></i>
        <span id="music-text">Play Music</span>
    </div>

    <audio id="bg-music" loop crossorigin="anonymous">
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div class="profile-container">
        <img src="pfp.jpg" alt="Spaweix" class="avatar" data-tilt data-tilt-max="15" data-tilt-speed="400" data-tilt-glare data-tilt-max-glare="0.3">
        
        <div class="discord-status-container">
            <div class="status-dot" id="d-dot"></div>
            <span id="d-text">Yükleniyor...</span>
        </div>

        <h1 class="name" id="profile-name">Spaweix</h1>
        <p class="subtitle" id="typewriter"></p>

        <div id="spotify-status" class="spotify-card" style="display: none;">
            <i class="fab fa-spotify"></i>
            <div class="spotify-info">
                <span id="song-name">Şarkı İsmi</span>
                <span id="artist-name">Sanatçı</span>
            </div>
        </div>
        
        <div class="social-links">
            <a href="https://discord.com" target="_blank" title="Discord: spaweix"><i class="fab fa-discord"></i></a>
            <a href="https://steamcommunity.com/profiles/76561199101770138/" target="_blank" title="Steam"><i class="fab fa-steam"></i></a>
            <a href="https://open.spotify.com/user/s3ffafedyi8e389viykqws5gt" target="_blank" title="Spotify"><i class="fab fa-spotify"></i></a>
            <a href="https://github.com/Spaweix" target="_blank" title="GitHub"><i class="fab fa-github"></i></a>
        </div>

        <button id="open-modal-btn" class="projects-btn">Projelerim</button>
    </div>

    <div id="projects-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">×</span>
            <h2>Projeler & Çalışmalar</h2>
            <div class="project-list">
                <div class="project-item">
                    <h3>📖 Sessizliğin Başlangıcı</h3>
                    <p>Luella, Teo ve Jessica'nın hikayesi... Sessizlik bazen bir başlangıçtır, bazen ise bir son.</p>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
